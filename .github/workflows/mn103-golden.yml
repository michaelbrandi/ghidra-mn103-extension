name: MN103 Golden

on:
  workflow_dispatch:

concurrency:
  group: mn103-golden-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instruction-golden:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GHIDRA_ZIP_URL: https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_12.0.4_build/ghidra_12.0.4_PUBLIC_20260303.zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Download Ghidra 12.0.4
        shell: bash
        run: |
          set -euo pipefail
          GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC"
          curl -fsSL "${GHIDRA_ZIP_URL}" -o "${RUNNER_TEMP}/ghidra.zip"
          unzip -q "${RUNNER_TEMP}/ghidra.zip" -d "${RUNNER_TEMP}"
          test -x "${GHIDRA_INSTALL_DIR}/support/analyzeHeadless"
          test -x "${GHIDRA_INSTALL_DIR}/support/gradle/gradlew"

      - name: Build extension package
        shell: bash
        run: GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC" ./tools/rebuild_mn103_extension.sh

      - name: Install the built extension into Ghidra
        shell: bash
        run: |
          set -euo pipefail
          GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC"
          ZIP_PATH="./dist/ghidra-mn103-extension.zip"
          test -f "${ZIP_PATH}"
          rm -rf "${GHIDRA_INSTALL_DIR}/Extensions/ghidra-mn103"
          mkdir -p "${GHIDRA_INSTALL_DIR}/Extensions"
          unzip -q "${ZIP_PATH}" -d "${GHIDRA_INSTALL_DIR}/Extensions"
          INSTALLED_SPEC="$(find "${GHIDRA_INSTALL_DIR}/Extensions" -type f -path '*/data/languages/mn103.slaspec' | head -n 1)"
          test -n "${INSTALLED_SPEC}"

      - name: Run golden instruction demo
        shell: bash
        run: |
          set -euo pipefail
          HOME_ROOT="${RUNNER_TEMP}/home-golden"
          mkdir -p "${HOME_ROOT}"
          HOME="${HOME_ROOT}" \
          GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC" \
          GHIDRA_USER_HOME="${HOME_ROOT}" \
          JAVA_TOOL_OPTIONS="-Duser.home=${HOME_ROOT}" \
          ./tools/run_instruction_golden.sh "${RUNNER_TEMP}/tmp_mn103_linux416" "${RUNNER_TEMP}/mn103_ci_golden"

  abi-golden:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GHIDRA_ZIP_URL: https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_12.0.4_build/ghidra_12.0.4_PUBLIC_20260303.zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Download Ghidra 12.0.4
        shell: bash
        run: |
          set -euo pipefail
          GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC"
          curl -fsSL "${GHIDRA_ZIP_URL}" -o "${RUNNER_TEMP}/ghidra.zip"
          unzip -q "${RUNNER_TEMP}/ghidra.zip" -d "${RUNNER_TEMP}"
          test -x "${GHIDRA_INSTALL_DIR}/support/analyzeHeadless"
          test -x "${GHIDRA_INSTALL_DIR}/support/gradle/gradlew"

      - name: Build extension package
        shell: bash
        run: GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC" ./tools/rebuild_mn103_extension.sh

      - name: Install the built extension into Ghidra
        shell: bash
        run: |
          set -euo pipefail
          GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC"
          ZIP_PATH="./dist/ghidra-mn103-extension.zip"
          test -f "${ZIP_PATH}"
          rm -rf "${GHIDRA_INSTALL_DIR}/Extensions/ghidra-mn103"
          mkdir -p "${GHIDRA_INSTALL_DIR}/Extensions"
          unzip -q "${ZIP_PATH}" -d "${GHIDRA_INSTALL_DIR}/Extensions"
          INSTALLED_SPEC="$(find "${GHIDRA_INSTALL_DIR}/Extensions" -type f -path '*/data/languages/mn103.slaspec' | head -n 1)"
          test -n "${INSTALLED_SPEC}"

      - name: Run ABI golden demo
        shell: bash
        run: |
          set -euo pipefail
          HOME_ROOT="${RUNNER_TEMP}/home-abi"
          mkdir -p "${HOME_ROOT}"
          HOME="${HOME_ROOT}" \
          GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC" \
          GHIDRA_USER_HOME="${HOME_ROOT}" \
          JAVA_TOOL_OPTIONS="-Duser.home=${HOME_ROOT}" \
          ./tools/run_abi_golden.sh "${RUNNER_TEMP}/mn103_ci_abi"

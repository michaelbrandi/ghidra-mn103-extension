name: MN103 CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: mn103-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GHIDRA_ZIP_URL: https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_12.0.4_build/ghidra_12.0.4_PUBLIC_20260303.zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Download Ghidra 12.0.4
        shell: bash
        run: |
          set -euo pipefail
          GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC"
          curl -fsSL "${GHIDRA_ZIP_URL}" -o "${RUNNER_TEMP}/ghidra.zip"
          unzip -q "${RUNNER_TEMP}/ghidra.zip" -d "${RUNNER_TEMP}"
          test -x "${GHIDRA_INSTALL_DIR}/support/analyzeHeadless"
          test -x "${GHIDRA_INSTALL_DIR}/support/gradle/gradlew"

      - name: Verify generated spec matches the checked-in spec
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/gen_mn103_slaspec.py \
            --opc-source tools/vendor/binutils/m10300-opc.c \
            --out "${RUNNER_TEMP}/mn103.generated.slaspec"
          diff -u data/languages/mn103.slaspec "${RUNNER_TEMP}/mn103.generated.slaspec"

      - name: Build extension package
        shell: bash
        run: GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC" ./tools/rebuild_mn103_extension.sh

      - name: Install the built extension into Ghidra
        shell: bash
        run: |
          set -euo pipefail
          GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC"
          ZIP_PATH="./dist/ghidra-mn103-extension.zip"
          test -f "${ZIP_PATH}"
          rm -rf "${GHIDRA_INSTALL_DIR}/Extensions/ghidra-mn103"
          mkdir -p "${GHIDRA_INSTALL_DIR}/Extensions"
          unzip -q "${ZIP_PATH}" -d "${GHIDRA_INSTALL_DIR}/Extensions"
          INSTALLED_SPEC="$(find "${GHIDRA_INSTALL_DIR}/Extensions" -type f -path '*/data/languages/mn103.slaspec' | head -n 1)"
          test -n "${INSTALLED_SPEC}"

      - name: Build smoke-test demo corpus
        shell: bash
        run: |
          set -euo pipefail
          TMP_LINUX="${RUNNER_TEMP}/tmp_mn103_linux416"
          ./tools/fetch_linux_mn103_refs.sh "${TMP_LINUX}"
          python3 tools/extract_linux_mn103_symbols.py --linux-root "${TMP_LINUX}"
          python3 tools/make_mn103_demo_binary.py \
            --symbols-dir "${TMP_LINUX}/ghidra_symbols" \
            --out-dir "${RUNNER_TEMP}/tmp_mn103_samples"

      - name: Smoke-test headless analysis
        shell: bash
        run: HOME="${RUNNER_TEMP}/home-smoke" GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC" GHIDRA_USER_HOME="${RUNNER_TEMP}/ghidra-user-smoke" ./tools/run_firmware_profile.sh "${RUNNER_TEMP}/tmp_mn103_samples" "${RUNNER_TEMP}/mn103_ci_smoke"

      - name: Golden-test instruction demo
        shell: bash
        run: |
          set -euo pipefail
          TMP_LINUX="${RUNNER_TEMP}/tmp_mn103_linux416"
          TMP_GOLDEN="${RUNNER_TEMP}/mn103_ci_golden"
          mkdir -p "${TMP_GOLDEN}/logs" "${TMP_GOLDEN}/projects"
          python3 tools/make_mn103_instruction_demo.py \
            --symbols-dir "${TMP_LINUX}/ghidra_symbols" \
            --out-dir "${TMP_GOLDEN}/demo"
          sync
          "${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC/support/analyzeHeadless" \
            "${TMP_GOLDEN}/projects" \
            mn103_instruction_mix_demo \
            -import "${TMP_GOLDEN}/demo/mn103_instruction_mix_demo.elf" \
            -loader ElfLoader \
            -overwrite \
            -analysisTimeoutPerFile 180 \
            -postScript PrintEntryInstructions.java \
            -scriptPath "./tools/ghidra_scripts" \
            > "${TMP_GOLDEN}/logs/instruction_golden.log" 2>&1
          required_lines=(
            "00002000: mov 0x31,D0"
            "00002002: mov 0x64,A0"
            "00002004: mov 0x1000,D0"
            "00002010: mov (A0),A1"
            "0000201c: fmov R5,FPCR"
            "0000201f: add 0x12340000,D0"
            "00002025: cmp 0xaa0000,D0"
            "0000202d: add 0x22,SP"
            "0000203a: xor 0xf0f,D0"
            "0000203e: bra 0x0000203e"
          )
          for needle in "${required_lines[@]}"; do
            grep -Fq "${needle}" "${TMP_GOLDEN}/logs/instruction_golden.log"
          done
          grep -Fq "Printed 19 instructions" "${TMP_GOLDEN}/logs/instruction_golden.log"

      - name: Upload packaged extension
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-mn103-extension
          path: dist/ghidra-mn103-extension.zip
          if-no-files-found: error

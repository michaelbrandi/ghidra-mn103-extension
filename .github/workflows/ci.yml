name: MN103 CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: mn103-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GHIDRA_ZIP_URL: https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_12.0.4_build/ghidra_12.0.4_PUBLIC_20260303.zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Download Ghidra 12.0.4
        shell: bash
        run: |
          set -euo pipefail
          GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC"
          curl -fsSL "${GHIDRA_ZIP_URL}" -o "${RUNNER_TEMP}/ghidra.zip"
          unzip -q "${RUNNER_TEMP}/ghidra.zip" -d "${RUNNER_TEMP}"
          test -x "${GHIDRA_INSTALL_DIR}/support/analyzeHeadless"
          test -x "${GHIDRA_INSTALL_DIR}/support/gradle/gradlew"

      - name: Verify generated spec matches the checked-in spec
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/gen_mn103_slaspec.py \
            --opc-source tools/vendor/binutils/m10300-opc.c \
            --out "${RUNNER_TEMP}/mn103.generated.slaspec"
          diff -u data/languages/mn103.slaspec "${RUNNER_TEMP}/mn103.generated.slaspec"

      - name: Build extension package
        shell: bash
        run: GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC" ./tools/rebuild_mn103_extension.sh

      - name: Install the built extension into Ghidra
        shell: bash
        run: |
          set -euo pipefail
          GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC"
          ZIP_PATH="$(find . -type f -name 'ghidra_*_ghidra-mn103*.zip' | sort | tail -n 1)"
          test -n "${ZIP_PATH}"
          rm -rf "${GHIDRA_INSTALL_DIR}/Extensions/ghidra-mn103"
          mkdir -p "${GHIDRA_INSTALL_DIR}/Extensions"
          unzip -q "${ZIP_PATH}" -d "${GHIDRA_INSTALL_DIR}/Extensions"
          INSTALLED_SPEC="$(find "${GHIDRA_INSTALL_DIR}/Extensions" -type f -path '*/data/languages/mn103.slaspec' | head -n 1)"
          test -n "${INSTALLED_SPEC}"

      - name: Build smoke-test demo corpus
        shell: bash
        run: |
          set -euo pipefail
          TMP_LINUX="${RUNNER_TEMP}/tmp_mn103_linux416"
          ./tools/fetch_linux_mn103_refs.sh "${TMP_LINUX}"
          python3 tools/extract_linux_mn103_symbols.py --linux-root "${TMP_LINUX}"
          python3 tools/make_mn103_demo_binary.py \
            --symbols-dir "${TMP_LINUX}/ghidra_symbols" \
            --out-dir "${RUNNER_TEMP}/tmp_mn103_samples" \
            --name mn103_ci_demo

      - name: Smoke-test headless analysis
        shell: bash
        run: GHIDRA_INSTALL_DIR="${RUNNER_TEMP}/ghidra_12.0.4_PUBLIC" ./tools/run_firmware_profile.sh "${RUNNER_TEMP}/tmp_mn103_samples" "${RUNNER_TEMP}/mn103_ci_smoke"

      - name: Upload packaged extension
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-mn103-extension
          path: dist/ghidra_*_ghidra-mn103.zip
          if-no-files-found: error
